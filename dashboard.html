<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Collection Pokémon</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
<div class="container">
    <!-- Header -->
    <header class="header">
        <h1>Ma Collection Pokémon</h1>
        <button id="logout-btn" class="logout-btn">Déconnexion</button>
    </header>

    <!-- Main cards -->
    <div class="cards-container">
        <!-- Nouveau card -->
        <div class="card main-card">
            <div class="card-icon">➕</div>
            <h2>Nouveau</h2>
            <p>Ajouter une nouvelle carte à votre collection</p>
            <button id="btn-nouveau" class="btn-primary">Ajouter une carte</button>
        </div>

        <!-- Collections card -->
        <div class="card main-card">
            <div class="card-icon">📚</div>
            <h2>Collections</h2>
            <p>Consulter votre collection de cartes</p>
            <button id="btn-collections" class="btn-primary">Voir la collection</button>
        </div>
    </div>
</div>

<!-- Modal pour ajouter une carte -->
<div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
        <button id="close-modal" class="close-btn">&times;</button>
        <h2>Ajouter une carte Pokémon</h2>

        <form id="card-form">
            <!-- Nom de la carte -->
            <div class="form-group">
                <label for="card-name">Nom de la carte :</label>
                <input type="text" id="card-name" required placeholder="Ex: Pikachu">
            </div>

            <!-- Numéro de la carte -->
            <div class="form-group">
                <label for="card-number">Numéro de la carte :</label>
                <input type="text" id="card-number" required placeholder="Ex: 25/102">
            </div>

            <!-- PV -->
            <div class="form-group">
                <label for="card-hp">PV (Points de vie) :</label>
                <input type="number" id="card-hp" required placeholder="Ex: 60">
            </div>

            <!-- État -->
            <div class="form-group">
                <label for="card-condition">État de la carte :</label>
                <select id="card-condition" required>
                    <option value="">-- Sélectionner un état --</option>
                    <option value="near-mint">Near Mint</option>
                    <option value="mint">Mint</option>
                    <option value="good">Good</option>
                    <option value="played">Played</option>
                </select>
            </div>

            <!-- Langue -->
            <div class="form-group">
                <label for="card-language">Langue :</label>
                <select id="card-language" required>
                    <option value="">-- Sélectionner une langue --</option>
                    <option value="francais">Français</option>
                    <option value="anglais">Anglais</option>
                    <option value="chinois">Chinois</option>
                    <option value="japonais">Japonais</option>
                    <option value="coreen">Coréen</option>
                    <option value="espagnol">Espagnol</option>
                    <option value="italien">Italien</option>
                    <option value="allemand">Allemand</option>
                </select>
            </div>

            <!-- Prix -->
            <div class="form-group">
                <label for="card-price">Prix payé (€) :</label>
                <input type="number" id="card-price" step="0.01" required placeholder="Ex: 15.99">
            </div>

            <!-- Lien Cardsmarket -->
            <div class="form-group">
                <label for="card-link">Lien Cardsmarket :</label>
                <input type="url" id="card-link" placeholder="https://www.cardsmarket.com/...">
            </div>

            <!-- Boutons -->
            <div class="form-buttons">
                <button type="submit" class="btn-submit">Ajouter la carte</button>
                <button type="button" id="btn-cancel" class="btn-cancel">Annuler</button>
            </div>
        </form>

        <!-- Message de succès/erreur -->
        <div id="form-message" class="form-message hidden"></div>
    </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-firestore-compat.js"></script>

<!-- Scripts -->
<script src="auth-config.js"></script>
<script src="dashboard.js"></script>
</body>
</html>

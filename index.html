<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion – Collection Pokémon</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

    <!-- Formulaire de connexion / inscription -->
    <form id="auth-form" novalidate>
        <h2 id="form-title">Se connecter</h2>

        <label for="email">E‑mail :</label>
        <input type="email" id="email" required placeholder="exemple@domaine.com">

        <label for="password">Mot de passe :</label>
        <input type="password" id="password" required minlength="6"
               placeholder="Votre mot de passe">

        <!-- Message d’aide pour le mot‑de‑passe -->
        <small id="pwd-help">
            Minimum 6 caractères, au moins une majuscule et un chiffre.
        </small>

        <button type="submit" id="submit-btn">Se connecter</button>
    </form>

    <!-- Lien vers l’inscription -->
    <p class="toggle-link">
        Pas encore de compte ?
        <a href="#" id="show-signup">Inscription</a>
    </p>

    <!-- Message d’erreur / succès -->
    <div id="message"></div>
</div>

<!-- Firebase SDKs (ajoutez votre propre config) -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="app.js"></script>
</body>
</html>

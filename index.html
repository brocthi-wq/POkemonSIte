<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Login simple</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <!-- Formulaire -->
    <form id="auth-form">
        <h2 id="form-title">Se connecter</h2>

        <label for="email">Adresse e‑mail :</label>
        <input type="email" id="email" required placeholder="exemple@domaine.com">

        <label for="password">Mot de passe :</label>
        <input type="password" id="password" required minlength="6" placeholder="••••••">

        <!-- Champ supplémentaire visible uniquement lors de la création -->
        <div id="confirm-field" class="hidden">
            <label for="confirm-password">Confirmez le mot de passe :</label>
            <input type="password" id="confirm-password" minlength="6" placeholder="••••••">
        </div>

        <button type="submit" id="action-btn">Se connecter</button>
    </form>

    <!-- Lien pour passer en mode création -->
    <p class="toggle-link">
        <a href="#" id="toggle-mode">Créer un compte</a>
    </p>
</div>

<!-- Modal de confirmation -->
<div id="modal" class="hidden">
    <div class="modal-content">
        <p id="modal-msg"></p>
        <button id="close-modal">Fermer</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
